<div class="h-screen w-screen flex items-center justify-center bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 relative overflow-hidden">
  <!-- Background decorative elements -->
  <div class="absolute top-0 left-0 w-96 h-96 bg-sky-500 rounded-full mix-blend-multiply filter blur-3xl opacity-10 animate-blob"></div>
  <div class="absolute top-0 right-0 w-96 h-96 bg-purple-500 rounded-full mix-blend-multiply filter blur-3xl opacity-10 animate-blob animation-delay-2000"></div>
  <div class="absolute -bottom-8 left-20 w-96 h-96 bg-pink-500 rounded-full mix-blend-multiply filter blur-3xl opacity-10 animate-blob animation-delay-4000"></div>

  <div class="relative z-10 w-full max-w-md px-4 py-8">
    <div class="bg-white/95 backdrop-blur-md p-8 rounded-2xl shadow-2xl border border-white/20">
      
      <div class="text-center mb-8">
        <div class="mx-auto w-16 h-16 bg-gradient-to-br from-sky-600 to-sky-700 rounded-2xl flex items-center justify-center mb-4 shadow-lg shadow-sky-500/50 transform transition hover:scale-105">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
        </div>
        <h1 class="text-4xl font-bold bg-gradient-to-r from-slate-900 to-slate-700 bg-clip-text text-transparent">Enterprise AI</h1>
        <h2 class="text-xl font-semibold text-default mt-2">
          {{ isRegistering ? 'Create Account' : 'Welcome Back' }}
        </h2>
        <p class="muted text-sm mt-1">Multi-Agent Platform</p>
      </div>

      <form class="space-y-5" (ngSubmit)="onSubmit()">
        <div class="space-y-2">
          <label class="block text-sm font-medium text-default">Email Address</label>
          <input type="email" 
                 [(ngModel)]="email" 
                 name="email" 
                 placeholder="you@example.com"
                 required 
                 class="w-full px-4 py-3 border" style="border-color:var(--card-contrast); border-radius:8px; background:var(--panel); color:var(--text);" placeholder="you@example.com">
        </div>

        <div class="space-y-2">
             <label class="block text-sm font-medium text-default">Password</label>
             <input type="password" 
               [(ngModel)]="password" 
               name="password"
               placeholder="••••••••"
               required 
               class="w-full px-4 py-3 border" style="border-color:var(--card-contrast); border-radius:8px; background:var(--panel); color:var(--text);">
        </div>

        <div *ngIf="errorMessage" class="p-4 rounded-lg" style="background:rgba(220,38,38,0.06); border-radius:8px; border:1px solid rgba(220,38,38,0.12)">
          <p class="text-red-700 text-sm font-medium">{{ errorMessage }}</p>
        </div>

        <button type="submit" 
                [disabled]="isLoading || !email || !password"
                class="w-full py-3 px-4 bg-gradient-to-r from-sky-600 to-sky-700 hover:from-sky-700 hover:to-sky-800 text-white font-semibold rounded-lg shadow-lg shadow-sky-500/30 hover:shadow-sky-500/50 disabled:opacity-50 disabled:cursor-not-allowed transition-all duration-200 transform hover:scale-105">
          {{ isLoading ? 'Processing...' : (isRegistering ? 'Create & Setup Organization' : 'Sign In') }}
        </button>
      </form>

        <div class="mt-6 text-center">
        <p class="muted text-sm mb-3">
          {{ isRegistering ? 'Already have an account?' : "Don't have an account?" }}
        </p>
        <button (click)="toggleMode()" 
                type="button" 
                class="font-semibold text-sky-600 hover:text-sky-700 transition-colors outline-none">
          {{ isRegistering ? 'Sign In' : 'Create Account' }}
        </button>
      </div>

    </div>

    <div class="text-center mt-6 muted text-xs">
      <p>🔒 Your data is encrypted end-to-end</p>
    </div>
  </div>
</div>
