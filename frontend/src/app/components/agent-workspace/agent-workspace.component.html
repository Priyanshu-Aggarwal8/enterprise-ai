<div class="flex-1 flex flex-row w-full max-w-7xl mx-auto overflow-hidden bg-white shadow-xl border-x border-slate-200">
  
  <div class="w-80 bg-slate-50 border-r border-slate-200 p-6 flex flex-col gap-6 overflow-y-auto">
    <div>
      <h2 class="text-sm font-bold text-slate-400 uppercase tracking-wider mb-4">Execution Context</h2>
      
      <div class="flex flex-col gap-4">
        <div>
          <label class="block text-xs font-semibold text-slate-600 mb-1">Organization ID (Required)</label>
          <input type="text" [(ngModel)]="orgId" placeholder="Paste your org UUID" 
                 class="w-full text-sm p-2 border border-slate-300 rounded focus:ring-2 focus:ring-sky-500 focus:border-sky-500 outline-none transition-all">
          <p class="text-[10px] text-slate-400 mt-1">This validates your BYOK API Key.</p>
        </div>

        <div>
          <label class="block text-xs font-semibold text-slate-600 mb-1">Session ID (Memory Thread)</label>
          <input type="text" [(ngModel)]="sessionId" 
                 class="w-full text-sm p-2 border border-slate-300 rounded focus:ring-2 focus:ring-sky-500 outline-none bg-slate-100">
        </div>

        <div>
          <label class="block text-xs font-semibold text-slate-600 mb-1">Agent ID</label>
          <input type="text" [(ngModel)]="agentId" disabled
                 class="w-full text-sm p-2 border border-slate-300 rounded bg-slate-200 text-slate-500 cursor-not-allowed">
        </div>
      </div>
    </div>
  </div>

  <div class="flex-1 flex flex-col bg-white">
    
    <div class="flex-1 p-6 overflow-y-auto flex flex-col gap-6">
      <div *ngFor="let msg of chatHistory" class="flex flex-col max-w-3xl"
           [ngClass]="{'self-end items-end': msg.role === 'user', 'self-start items-start': msg.role !== 'user'}">
        
        <span class="text-xs font-semibold text-slate-400 mb-1 ml-1" *ngIf="msg.role === 'agent'">AI Agent</span>
        <span class="text-xs font-semibold text-slate-400 mb-1 mr-1" *ngIf="msg.role === 'user'">You</span>

        <div class="px-5 py-3 rounded-2xl shadow-sm text-sm"
             [ngClass]="{
               'bg-sky-600 text-white rounded-br-sm': msg.role === 'user',
               'bg-slate-100 text-slate-800 rounded-bl-sm border border-slate-200': msg.role === 'agent',
               'bg-emerald-50 text-emerald-700 text-xs border border-emerald-200 font-mono w-full text-center rounded-lg': msg.role === 'system'
             }">
          
          <span [class.animate-pulse]="msg.isStreaming" [class.text-sky-600]="msg.isStreaming">
            {{ msg.content }}
          </span>
          
        </div>
      </div>
    </div>

    <div class="p-4 border-t border-slate-200 bg-slate-50">
      <div class="max-w-4xl mx-auto flex gap-3 relative">
        <input type="text" [(ngModel)]="prompt" (keyup.enter)="submitPrompt()"
               [disabled]="isExecuting"
               placeholder="Ask the agent a question..." 
               class="flex-1 p-4 pr-24 border border-slate-300 rounded-xl shadow-inner focus:ring-2 focus:ring-sky-500 focus:border-sky-500 outline-none text-slate-700 disabled:bg-slate-100 disabled:cursor-not-allowed transition-all">
        
        <button (click)="submitPrompt()" [disabled]="isExecuting || !prompt.trim() || !orgId.trim()"
                class="absolute right-2 top-2 bottom-2 px-6 bg-slate-900 text-white font-semibold rounded-lg hover:bg-slate-800 focus:ring-2 focus:ring-offset-2 focus:ring-slate-900 disabled:opacity-50 disabled:cursor-not-allowed transition-all flex items-center justify-center">
          <span *ngIf="!isExecuting">Send</span>
          <span *ngIf="isExecuting" class="flex items-center gap-2">
             <div class="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
          </span>
        </button>
      </div>
      <p class="text-center text-xs text-slate-400 mt-2 font-medium" *ngIf="!orgId.trim()">
        <span class="text-red-500">⚠</span> Please enter an Organization ID on the left to enable chat.
      </p>
    </div>
    
  </div>
</div>
