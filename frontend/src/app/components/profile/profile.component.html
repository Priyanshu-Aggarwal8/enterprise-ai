<div class="min-h-screen bg-app flex items-center">
  <div class="max-w-4xl mx-auto w-full p-8">
    <div class="card-shadow rounded-2xl overflow-hidden grid grid-cols-1 md:grid-cols-3">
      <div class="p-8" style="background: linear-gradient(135deg,var(--accent),var(--accent-600)); color: white; display:flex; flex-direction:column; align-items:center;">
        <div class="w-24 h-24 rounded-full bg-white/10 flex items-center justify-center text-2xl font-bold">AI</div>
        <div class="mt-4 text-center">
          <div class="text-xl font-bold max-w-xs truncate" title="{{ email || 'User' }}">{{ email || 'User' }}</div>
          <div class="text-sm opacity-80">Member</div>
        </div>
      </div>

      <div class="col-span-2 p-8 card" style="border-left:1px solid var(--card-contrast)">
        <h3 class="text-2xl font-bold mb-2 text-default">Profile</h3>
        <p class="text-sm muted mb-6">Manage your account and organization.</p>

        <div class="grid grid-cols-1 gap-4">
          <div class="p-4 border rounded bg-panel">
            <div class="text-xs muted">Email</div>
            <div class="font-medium">{{ email || '—' }}</div>
          </div>

          <div class="p-4 border rounded bg-panel">
            <div class="text-xs muted">Organization</div>
            <div class="font-medium">{{ orgName || 'Not assigned' }}</div>
            <div class="text-xs muted">ID: {{ orgId || '—' }}</div>
            <div class="mt-3">
              <button (click)="copyOrgId()" [disabled]="!orgId" class="px-3 py-1 btn-accent rounded text-sm">Copy Org ID</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
